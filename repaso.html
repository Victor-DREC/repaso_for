<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Neón Simétrico</title>
    <link rel="stylesheet" href="repaso.css">
    <script src="repaso.js"></script>
</head>
<body>
    <div class="neon-wrapper">
        <header>
            <h1 class="neon-text">REPASO <span class="cyan">JS</span></h1>
        </header>

        <main class="dashboard">
            <section class="card">
                <h3>Lógica y Secuencias</h3>
                <div class="button-group">
                    <button class="btn btn-blue" onclick="mostrar(1)">Ejercicio 1</button>
                    <button class="btn btn-blue" onclick="mostrar(2)">Centenas</button>
                    <button class="btn btn-blue" onclick="mostrar(3)">Centenas Regresivo</button>
                    <button class="btn btn-blue" onclick="mostrar(9)">PARES</button>
                    <button class="btn btn-blue" onclick="mostrar(11)">IMPRIMIR SECUENCIA</button>
                </div>
            </section>

            <section class="card">
                <h3>Notificaciones</h3>
                <div class="button-group">
                    <button class="btn btn-pink" onclick="mostrar(4)">Mensaje 1</button>
                    <button class="btn btn-pink" onclick="mostrar(5)">Mensaje 2</button>
                    <button class="btn btn-pink" onclick="mostrar(6)">Mensaje 3</button>
                    <button class="btn btn-pink" onclick="mostrar(7)">Mensaje 4</button>
                </div>
            </section>

            <section class="card">
                <h3>Estructuras y Tablas</h3>
                <div class="button-group">
                    <button class="btn btn-green" onclick="mostrar(10)">IMPRIMIR LISTA</button>
                    <button class="btn btn-green" onclick="mostrar(12)">IMPRIMIR PIRAMIDE</button>
                    <button class="btn btn-green" onclick="mostrar(13)">PIRAMIDE INVERTIDA</button>
                    <button class="btn btn-green" onclick="mostrar(8)">TABLA DEL 3</button>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
